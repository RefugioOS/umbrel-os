manifestVersion: 1
id: refugioos-seedforge
category: bitcoin
name: SeedForge
version: "0.2.0-refugioos.1"
tagline: Recuperación local BIP39 / Local BIP39 recovery
description: >-
  ES: SeedForge ayuda al propietario legítimo de una wallet a recuperar frases
  semilla BIP39 parcialmente perdidas desde su propio Umbrel. Ejecuta las
  búsquedas localmente, valida checksums y guarda sesiones/resultados en el
  almacenamiento persistente de la app. Credenciales iniciales: usuario admin y
  contraseña refugioos.

  EN: SeedForge helps the legitimate wallet owner recover partially lost BIP39
  seed phrases from their own Umbrel. Searches run locally, checksums are
  validated, and sessions/results stay in the app persistent storage. Initial
  credentials: user admin and password refugioos.

  Esta es una app propia de RefugioOS empaquetada para UmbrelOS. No incluye
  código fuente en el repositorio público; consume una imagen Docker versionada.
  Uso previsto: recuperación de wallets propias o con autorización explícita. No
  expongas esta app a internet y no introduzcas datos reales hasta revisar
  credenciales y almacenamiento.
developer: RefugioOS
website: https://github.com/RefugioOS
dependencies: []
repo: https://github.com/RefugioOS/seedforge-docker
support: https://github.com/RefugioOS/seedforge-docker/issues
port: 8000
gallery: []
path: ""
defaultUsername: "admin"
defaultPassword: "refugioos"
submitter: RefugioOS
submission: ""
releaseNotes: >-
  ES: añadir recuperación de 24 palabras, passphrase y métricas de progreso

  EN: Add 24-word retrieval, passphrase, and progress metrics
