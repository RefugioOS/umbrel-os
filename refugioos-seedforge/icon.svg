<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0d0d1f"/>
    </linearGradient>
    <linearGradient id="seedGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="55%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="flameGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#b91c1c"/>
      <stop offset="40%" stop-color="#f97316"/>
      <stop offset="80%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fef9c3"/>
    </linearGradient>
    <radialGradient id="glowSeed" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="flameBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="seedGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Ambient glow behind seed -->
  <ellipse cx="256" cy="300" rx="140" ry="175" fill="url(#glowSeed)"/>

  <!-- Seed body (large grain/bean shape) -->
  <g filter="url(#seedGlow)">
    <ellipse cx="256" cy="300" rx="108" ry="152" fill="url(#seedGrad)"/>
  </g>

  <!-- Seed inner highlight -->
  <ellipse cx="230" cy="248" rx="32" ry="55" fill="#fef3c7" opacity="0.12"/>

  <!-- Seed center groove -->
  <path d="M256,155 C262,205 264,255 261,305 C259,345 257,385 256,445"
        stroke="#78350f" stroke-width="5" fill="none" stroke-opacity="0.45"/>

  <!-- Seed lateral grooves -->
  <path d="M256,200 Q290,235 282,290" stroke="#92400e" stroke-width="2.5" fill="none" stroke-opacity="0.35"/>
  <path d="M256,260 Q288,295 278,345" stroke="#92400e" stroke-width="2.5" fill="none" stroke-opacity="0.35"/>
  <path d="M256,200 Q222,235 230,290" stroke="#92400e" stroke-width="2.5" fill="none" stroke-opacity="0.35"/>
  <path d="M256,260 Q224,295 234,345" stroke="#92400e" stroke-width="2.5" fill="none" stroke-opacity="0.35"/>

  <!-- Flame (forge) rising from top of seed -->
  <g filter="url(#flameBlur)">
    <!-- Left tongue -->
    <path d="M256,158
             C246,138 228,115 242,86
             C249,70  259,80  255,97
             C248,78  242,55  252,35
             C238,52  235,78  248,100
             C240,88  228,88  232,106
             C237,130 248,148 256,158Z"
          fill="url(#flameGrad)" opacity="0.85"/>
    <!-- Right tongue -->
    <path d="M256,158
             C266,134 282,110 270,80
             C264,64  254,76  257,93
             C266,72  274,48  263,28
             C278,46  280,72  266,96
             C276,82  290,84  285,104
             C278,128 267,148 256,158Z"
          fill="url(#flameGrad)"/>
    <!-- Center core (brightest) -->
    <path d="M256,155
             C251,135 248,108 256,80
             C264,108 261,135 256,155Z"
          fill="#fef9c3" opacity="0.7"/>
  </g>

  <!-- Sparks -->
  <circle cx="312" cy="90"  r="6" fill="#fef3c7" opacity="0.90"/>
  <circle cx="202" cy="82"  r="4" fill="#fef3c7" opacity="0.75"/>
  <circle cx="324" cy="128" r="3" fill="#fbbf24" opacity="0.80"/>
  <circle cx="190" cy="120" r="3" fill="#fbbf24" opacity="0.65"/>
  <circle cx="295" cy="55"  r="2" fill="#fef9c3" opacity="0.70"/>
  <circle cx="220" cy="50"  r="2" fill="#fef9c3" opacity="0.55"/>
</svg>
