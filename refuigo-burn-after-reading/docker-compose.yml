version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: refuigo-burn-after-reading_app_1
      APP_PORT: "80"

  app:
    image: ghcr.io/refuigoos/burn-after-reading:0.1.6-refuigo.1
    restart: on-failure
    environment:
      PORT: "80"
      BAR_PASSWORD: "${APP_PASSWORD:-change-this-password}"
    volumes:
      - ${APP_DATA_DIR}/data:/data
