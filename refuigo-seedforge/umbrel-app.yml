manifestVersion: 1
id: refuigo-seedforge
category: bitcoin
name: SeedForge
version: "0.1.1-refuigo.1"
tagline: Recuperacion local de frases BIP39 parcialmente perdidas
description: >-
  SeedForge ayuda al propietario legitimo de una wallet a recuperar frases
  semilla BIP39 parcialmente perdidas desde su propio Umbrel. Ejecuta las
  busquedas localmente, valida checksums y guarda sesiones/resultados en el
  almacenamiento persistente de la app. Desde Settings puedes configurar APIs
  externas, API keys BTC/ETH y nodos o APIs propias con prioridad.

  Esta es una app propia de RefuigoOS empaquetada para UmbrelOS. No incluye
  codigo fuente en el repositorio publico; consume una imagen Docker versionada.

  Uso previsto: recuperacion de wallets propias o con autorizacion explicita.
  No expongas esta app a internet y no introduzcas datos reales hasta revisar
  credenciales y almacenamiento.
developer: RefuigoOS
website: https://github.com/RefuigoOS
dependencies: []
repo: https://github.com/RefuigoOS/seedforge-docker
support: https://github.com/RefuigoOS/seedforge-docker/issues
port: 8000
gallery: []
path: ""
defaultUsername: "admin"
defaultPassword: "Generated by Umbrel"
submitter: RefuigoOS
submission: ""
releaseNotes: >-
  Settings redisenado: APIs externas separadas de nodos/APIs propias, nuevo
  listado de API keys BTC/ETH, soporte para varias fuentes BTC tipo Esplora y
  correccion de textos visibles con codificacion rota.
